    { kategori: "Review Basic Oceanography", tipe: "essay", pertanyaan: "Gambarkan dan jelaskan profil vertikal densitas air laut di daerah tropis vs kutub!", kunci_jawaban: "Di tropis, terdapat lapisan pycnocline yang tajam (densitas rendah di permukaan karena panas, densitas tinggi di dalam). Di kutub, profil densitas relatif konstan (isopycnal) dari permukaan hingga dasar karena suhu permukaan yang sudah sangat dingin, memfasilitasi pembentukan massa air dalam (deep water formation)." },
    { kategori: "Review Basic Oceanography", tipe: "essay", pertanyaan: "Jelaskan fenomena Ekman Spiral dan hubungannya dengan transpor massa air!", kunci_jawaban: "Ekman spiral adalah struktur arus di mana setiap lapisan air di bawah permukaan bergerak lebih lambat dan membelok lebih jauh (akibat Coriolis) dibanding lapisan di atasnya. Secara neto, seluruh lapisan air tersebut (Ekman Layer) berpindah 90 derajat terhadap arah angin, yang disebut Ekman Transport." },
    { kategori: "Review Basic Oceanography", tipe: "essay", pertanyaan: "Bagaimana kaitan antara sirkulasi angin (Gyre) dengan akumulasi Marine Debris (sampah laut)?", kunci_jawaban: "Sirkulasi Gyre menciptakan area konvergensi di pusatnya (pusat tekanan tinggi). Sampah yang terbawa arus permukaan akan terjebak dan terkumpul di pusat gyre tersebut karena gaya Coriolis dan tekanan, membentuk 'Garbage Patches' seperti di Pasifik Utara." },

    { kategori: "Water and Seawater Property", tipe: "essay", pertanyaan: "Uraikan 3 anomali sifat fisis air akibat adanya ikatan hidrogen!", kunci_jawaban: "1) Kapasitas panas tinggi: membutuhkan energi besar untuk menaikkan suhu. 2) Densitas es lebih rendah dari air cair: es mengapung. 3) Titik didih dan titik beku yang jauh lebih tinggi dibanding senyawa hidrida sejenis (H2S, H2Se) sehingga air berwujud cair pada suhu permukaan bumi." },
    { kategori: "Water and Seawater Property", tipe: "essay", pertanyaan: "Jelaskan konsep 'Residence Time' dan hubungannya dengan reaktivitas suatu unsur di laut!", kunci_jawaban: "Residence time adalah waktu rata-rata suatu unsur berada di laut sebelum dihilangkan oleh proses fisik atau kimia. Hubungannya: Unsur konservatif (seperti Na) memiliki residence time panjang karena tidak reaktif. Unsur non-konservatif (seperti Fe) memiliki residence time pendek karena sangat reaktif (mudah diserap biologi atau diendapkan)." },
    { kategori: "Water and Seawater Property", tipe: "essay", pertanyaan: "Bagaimana proses pembentukan es laut (sea ice) mempengaruhi salinitas air di sekitarnya (brine rejection)?", kunci_jawaban: "Saat air laut membeku, hanya molekul air murni yang membentuk kristal es. Garam-garam tidak ikut masuk ke struktur kristal dan dikeluarkan ke air di bawahnya (brine rejection). Hal ini menyebabkan air di bawah es menjadi sangat asin dan sangat rapat (dense), yang kemudian tenggelam memicu sirkulasi dalam." },

    { kategori: "Major, Minor, and Trace Elements", tipe: "essay", pertanyaan: "Bedakan profil vertikal unsur 'Nutrient-type' dengan 'Scavenged-type'!", kunci_jawaban: "Nutrient-type (ex: Zn, Si): Konsentrasi rendah di permukaan karena dikonsumsi organisme, meningkat di laut dalam karena remineralisasi bahan organik. Scavenged-type (ex: Al, Mn): Konsentrasi tinggi di permukaan (input debu/sungai), menurun drastis di kedalaman karena ion tersebut melekat pada partikel yang tenggelam (adsorpsi)." },

    { kategori: "Gas Terlarut di Laut", tipe: "essay", pertanyaan: "Uraikan profil vertikal Karbon Dioksida (CO2) dan hubungannya dengan profil Oksigen (O2)!", kunci_jawaban: "Profil CO2 berlawanan dengan O2. Di permukaan, CO2 rendah karena dikonsumsi fotosintesis sementara O2 tinggi. Seiring bertambahnya kedalaman, CO2 meningkat akibat respirasi dan remineralisasi bahan organik yang melepaskan CO2 kembali, sementara O2 menurun drastis dikonsumsi proses tersebut (OMZ). Di laut dalam, CO2 tetap tinggi karena suhu dingin dan tekanan tinggi mendukung kelarutannya." },
    { kategori: "Gas Terlarut di Laut", tipe: "essay", pertanyaan: "Mengapa kelarutan gas Karbon Dioksida (CO2) di laut jauh lebih besar (puluhan kali lipat) dibandingkan Oksigen (O2)?", kunci_jawaban: "Karena CO2 tidak hanya larut secara fisik, tetapi juga bereaksi secara kimiawi dengan molekul air membentuk Asam Karbonat (H2CO3), yang kemudian terdisosiasi menjadi Bikarbonat (HCO3-) dan Karbonat (CO3 2-). Sistem buffer karbonat ini memungkinkan laut menyimpan cadangan karbon yang jauh lebih besar dalam bentuk ionik." },
    { kategori: "Gas Terlarut di Laut", tipe: "essay", pertanyaan: "Apa yang dimaksud dengan 'Methane Hydrates' dan mengapa mereka dianggap sebagai 'ancaman' sekaligus 'peluang'?", kunci_jawaban: "Struktur kristal air yang memerangkap gas metana di sedimen laut dalam. Peluang: sebagai sumber energi masa depan (gas alam) yang masif. Ancaman: jika suhu laut naik atau tekanan berkurang, mereka bisa mencair dan melepaskan metana (gas rumah kaca yang 25x lebih kuat dari CO2) ke atmosfer secara mendadak, memicu pemanasan global ekstrem." },

    { kategori: "Interaksi Ion, POM, dan DOM", tipe: "essay", pertanyaan: "Jelaskan mekanisme pembentukan lapisan hidrasi pada ion Kation vs Anion!", kunci_jawaban: "Kation (muatan positif) akan menarik atom Oksigen dari molekul air (yang bermuatan parsial negatif) untuk menghadap ke arah kation. Sebaliknya, Anion (muatan negatif) akan menarik atom Hidrogen dari molekul air (yang bermuatan parsial positif) untuk menghadap ke arah anion. Orientasi ini menciptakan struktur air yang teratur di sekeliling ion." },
    { kategori: "Interaksi Ion, POM, dan DOM", tipe: "essay", pertanyaan: "Apa yang dimaksud dengan 'Biological Pump' (Pompa Biologis) dalam siklus karbon laut?", kunci_jawaban: "Biological pump adalah proses di mana karbon dioksida di lapisan permukaan diambil oleh fitoplankton melalui fotosintesis, diubah menjadi materi organik (POM), yang kemudian dimakan atau mati dan tenggelam ke laut dalam (sedimentasi). Proses ini memindahkan karbon secara efektif dari atmosfer ke dasar samudra dalam jangka panjang." },
    { kategori: "Interaksi Ion, POM, dan DOM", tipe: "essay", pertanyaan: "Mengapa DOM Refractory sangat penting dalam studi siklus karbon global?", kunci_jawaban: "Karena volumenya yang sangat besar dan daya tahannya yang luar biasa terhadap degradasi biologis (bisa bertahan > 5000 tahun). DOM refractory berfungsi sebagai 'reservoir' karbon organik terlarut yang stabil di laut dalam, mencegah karbon tersebut kembali ke atmosfer dalam waktu cepat sebagai CO2." },

    { kategori: "Asam-Basa dan pH Laut", tipe: "pg", pertanyaan: "Pernyataan yang benar mengenai Alkalinitas Karbonat adalah...", pilihan: ["Hanya terdiri dari ion Na+.", "Bagian dari alkalinitas total yang berasal dari ion HCO3- dan CO3 2-.", "Selalu bernilai negatif.", "Sama dengan salinitas."], kunci_jawaban: "Bagian dari alkalinitas total yang berasal dari ion HCO3- dan CO3 2-." },
    { kategori: "Asam-Basa dan pH Laut", tipe: "pg", pertanyaan: "Apa efek peningkatan suhu air laut terhadap pH (dengan asumsi parameter lain tetap)?", pilihan: ["pH akan sedikit menurun karena perubahan konstanta disosiasi Kw.", "pH akan meningkat drastis.", "pH tidak dipengaruhi suhu.", "Air akan menjadi tawar."], kunci_jawaban: "pH akan sedikit menurun karena perubahan konstanta disosiasi Kw." },
    { kategori: "Asam-Basa dan pH Laut", tipe: "pg", pertanyaan: "Borat (B(OH)3) berkontribusi sekitar _____ terhadap alkalinitas total laut.", pilihan: ["1%", "4-5%", "50%", "90%"], kunci_jawaban: "4-5%" },
    { kategori: "Asam-Basa dan pH Laut", tipe: "pg", pertanyaan: "Dalam sistem air laut, jika Alkalinitas Total tetap namun CO2 terlarut meningkat, maka...", pilihan: ["pH akan turun dan CO3 2- akan berkurang.", "pH akan naik.", "Karang akan tumbuh lebih cepat.", "Salinitas akan turun."], kunci_jawaban: "pH akan turun dan CO3 2- akan berkurang." },
    { kategori: "Asam-Basa dan pH Laut", tipe: "essay", pertanyaan: "Jelaskan mengapa laut disebut memiliki kemampuan 'Self-Buffering' terhadap penambahan asam!", kunci_jawaban: "Laut memiliki sistem buffer karbonat yang sangat kuat. Ketika asam (ion H+) ditambahkan, ion karbonat (CO3 2-) yang tersedia akan bereaksi dengan H+ tersebut membentuk bikarbonat (HCO3-). Reaksi ini menetralkan kelebihan H+ sehingga perubahan pH menjadi sangat kecil. Namun, kapasitas ini terbatas dan saat ini mulai tertekan oleh tingginya emisi CO2 atmosfer." },
    { kategori: "Asam-Basa dan pH Laut", tipe: "essay", pertanyaan: "Uraikan dampak 'Ocean Acidification' terhadap rantai makanan di laut!", kunci_jawaban: "Pengasaman laut menurunkan saturasi ion karbonat, yang menyulitkan organisme basis rantai makanan seperti pteropoda (siput laut), coccolithophore, dan larva moluska untuk membentuk cangkang kalsium karbonat. Jika populasi organisme dasar ini runtuh, maka predator di tingkat atas (seperti ikan dan paus) akan kehilangan sumber makanan utama, yang berujung pada ketidakseimbangan ekosistem global." },
    { kategori: "Asam-Basa dan pH Laut", tipe: "essay", pertanyaan: "Bedakan antara 'pH' dan 'Alkalinitas'!", kunci_jawaban: "pH adalah ukuran intensitas keasaman atau konsentrasi ion hidrogen [H+] bebas dalam air pada saat tertentu (parameter intensif). Alkalinitas adalah ukuran kapasitas kuantitatif air untuk menetralkan asam atau menahan perubahan pH (parameter ekstensif), yang ditentukan oleh jumlah basa terlarut seperti bikarbonat, karbonat, dan borat." }
];


let soalAktif = [], indeksSoal = 0, jawabanUser = [];

function initMenu() {
    const container = document.getElementById('menu-container');
    container.innerHTML = ''; 
    const kategoriUnik = [...new Set(databaseSoal.map(s => s.kategori))];
    kategoriUnik.forEach(k => {
        const btn = document.createElement('button');
        btn.className = 'btn-outline';
        btn.innerText = k;
        btn.onclick = () => startQuiz(k);
        container.appendChild(btn);
    });
}

function startQuiz(k) {
    soalAktif = k === 'Semua Topik' ? [...databaseSoal].sort(() => Math.random() - 0.5) : databaseSoal.filter(s => s.kategori === k);
    indeksSoal = 0; 
    jawabanUser = new Array(soalAktif.length).fill(""); 
    document.getElementById('home-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'none'; 
    document.getElementById('quiz-screen').style.display = 'block';
    document.getElementById('current-category-text').innerText = k;
    renderSoal();
}

function renderSoal() {
    const s = soalAktif[indeksSoal];
    document.getElementById('question-counter').innerText = `Soal ${indeksSoal + 1} / ${soalAktif.length}`;
    document.getElementById('progress-bar').style.width = `${((indeksSoal + 1) / soalAktif.length) * 100}%`;
    document.getElementById('question-text').innerText = s.pertanyaan;
    
    const container = document.getElementById('answer-container');
    container.innerHTML = '';

    if (s.tipe === 'pg') {
        const div = document.createElement('div');
        div.className = 'options-list';
        s.pilihan.forEach(o => {
            const lbl = document.createElement('label'); 
            lbl.className = 'option-item' + (jawabanUser[indeksSoal] === o ? ' selected' : '');
            lbl.innerHTML = `<input type="radio" name="opt" ${jawabanUser[indeksSoal] === o ? 'checked' : ''}> ${o}`;
            lbl.onclick = () => {
                jawabanUser[indeksSoal] = o;
                renderSoal(); 
            };
            div.appendChild(lbl);
        });
        container.appendChild(div);
    } else {
        const txt = document.createElement('textarea');
        txt.className = 'essay-area';
        txt.placeholder = 'Tuliskan jawaban Anda di sini...';
        txt.value = jawabanUser[indeksSoal];
        txt.oninput = (e) => { jawabanUser[indeksSoal] = e.target.value; };
        container.appendChild(txt);
    }

    document.getElementById('btn-prev').style.display = indeksSoal === 0 ? 'none' : 'block';
    document.getElementById('btn-next').style.display = indeksSoal === soalAktif.length - 1 ? 'none' : 'block';
}

function nextQuestion() { if (indeksSoal < soalAktif.length - 1) { indeksSoal++; renderSoal(); } }
function prevQuestion() { if (indeksSoal > 0) { indeksSoal--; renderSoal(); } }

function showResults() {
    const belum = jawabanUser.filter(j => j === "").length;
    if (belum > 0) {
        if (!confirm(`Masih ada ${belum} soal belum diisi. Tetap ingin mengakhiri dan lihat hasil?`)) return;
    }

    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    
    let skor = 0;
    let pgTotal = 0;
    const rev = document.getElementById('review-container'); rev.innerHTML = '';
    
    soalAktif.forEach((s, i) => {
        const u = jawabanUser[i];
        const card = document.createElement('div'); card.className = 'review-card';
        
        if(s.tipe === 'pg') {
            pgTotal++;
            let isWrong = u !== s.kunci_jawaban;
            if (isWrong) card.classList.add('wrong-pg');
            if (!isWrong && u !== "") skor++;
            
            card.innerHTML = `
                <div>
                    <span class="review-badge">${s.tipe.toUpperCase()}</span>
                    <span style="font-weight:bold">${i+1}. ${s.pertanyaan}</span>
                </div>
                <div class="ans-user">${u === "" ? "Tidak diisi" : u} ${u === "" ? "" : (isWrong ? '<span style="color:red; font-weight:bold"> (Salah)</span>' : '<span style="color:green; font-weight:bold"> (Benar)</span>')}</div>
                <div style="font-size:12px; color:#666; margin-top:10px">Jawaban Kunci:</div>
                <div class="ans-ref">${s.kunci_jawaban}</div>
            `;
        } else {
            card.innerHTML = `
                <div>
                    <span class="review-badge">ESSAY</span>
                    <span style="font-weight:bold">${i+1}. ${s.pertanyaan}</span>
                </div>
                <div style="font-size:12px; color:#666; margin-top:15px;">Jawaban Anda:</div>
                <div class="ans-user" style="white-space: pre-wrap;">${u === "" ? "Tidak diisi" : u}</div>
                <div style="font-size:12px; color:#666; margin-top:10px">Referensi Jawaban Kunci:</div>
                <div class="ans-ref">${s.kunci_jawaban}</div>
            `;
        }
        rev.appendChild(card);
    });
    
    document.getElementById('score-category-name').innerText = document.getElementById('current-category-text').innerText;
    document.getElementById('score-text-total').innerText = `${skor} / ${pgTotal}`;
    window.scrollTo(0,0);
}

initMenu();
</script>
